<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TradingView Stocks Solution (Dark)</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      background-color: #131722; /* TradingView Dark Theme Background */
      font-family: -apple-system, BlinkMacSystemFont, "Trebuchet MS", Roboto, Ubuntu, sans-serif;
      overflow-x: hidden;
    }

    /* Container for the whole dashboard */
    .tv-dashboard {
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    /* Ticker Tape at the top */
    .tv-ticker-tape {
      height: 46px; /* standard height */
      flex-shrink: 0;
    }

    /* Main content area */
    .tv-main-content {
      display: flex;
      flex-grow: 1;
      padding: 16px;
      gap: 16px;
      box-sizing: border-box;
      height: calc(100vh - 46px);
    }

    /* Left column (Symbol Info + Chart) */
    .tv-left-col {
      flex: 3;
      display: flex;
      flex-direction: column;
      gap: 16px;
      min-width: 0; /* flexbox fix */
    }

    .tv-symbol-info {
      height: 72px; /* standard height */
      flex-shrink: 0;
    }

    .tv-advanced-chart {
      flex-grow: 1;
      position: relative;
    }

    /* Right column (Technical Analysis + Profile) */
    .tv-right-col {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 16px;
      min-width: 300px;
    }

    .tv-technical-analysis {
      height: 450px;
      flex-shrink: 0;
    }

    .tv-company-profile {
      flex-grow: 1;
      min-height: 200px;
    }

    @media (max-width: 900px) {
      .tv-main-content {
        flex-direction: column;
        height: auto;
      }
      .tv-advanced-chart {
        min-height: 500px;
      }
      .tv-right-col {
        min-width: 100%;
      }
    }
  </style>
</head>
<body>

  <div class="tv-dashboard">
    <!-- Ticker Tape -->
    <div class="tv-ticker-tape">
      <div class="tradingview-widget-container">
        <div class="tradingview-widget-container__widget"></div>
        <script type="text/javascript" src="https://s3.tradingview.com/external-embedding/embed-widget-ticker-tape.js" async>
        {
        "symbols": [
          { "proName": "NASDAQ:AAPL", "title": "Apple" },
          { "proName": "NASDAQ:TSLA", "title": "Tesla" },
          { "proName": "NASDAQ:NVDA", "title": "Nvidia" },
          { "proName": "NASDAQ:AMZN", "title": "Amazon" },
          { "proName": "NASDAQ:MSFT", "title": "Microsoft" }
        ],
        "showSymbolLogo": true,
        "colorTheme": "dark",
        "isTransparent": false,
        "displayMode": "adaptive",
        "locale": "th_TH"
        }
        </script>
      </div>
    </div>

    <div class="tv-main-content">
      <!-- Left Column -->
      <div class="tv-left-col">
        <!-- Symbol Info -->
        <div class="tv-symbol-info">
          <div class="tradingview-widget-container">
            <div class="tradingview-widget-container__widget"></div>
            <script type="text/javascript" src="https://s3.tradingview.com/external-embedding/embed-widget-symbol-info.js" async>
            {
            "symbol": "NASDAQ:AAPL",
            "width": "100%",
            "locale": "th_TH",
            "colorTheme": "dark",
            "isTransparent": false
            }
            </script>
          </div>
        </div>

        <!-- Advanced Chart -->
        <div class="tv-advanced-chart">
          <div class="tradingview-widget-container" style="height: 100%; width: 100%;">
            <div id="tradingview_demo" style="height: 100%; width: 100%;"></div>
            <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
            <script type="text/javascript">
            new TradingView.widget({
              "autosize": true,
              "symbol": "NASDAQ:AAPL",
              "interval": "D",
              "timezone": "Asia/Bangkok",
              "theme": "dark",
              "style": "1",
              "locale": "th_TH",
              "enable_publishing": false,
              "backgroundColor": "#131722",
              "gridColor": "#2a2e39",
              "hide_top_toolbar": false,
              "hide_legend": false,
              "save_image": false,
              "container_id": "tradingview_demo"
            });
            </script>
          </div>
        </div>
      </div>

      <!-- Right Column -->
      <div class="tv-right-col">
        <!-- Technical Analysis -->
        <div class="tv-technical-analysis">
          <div class="tradingview-widget-container">
            <div class="tradingview-widget-container__widget"></div>
            <script type="text/javascript" src="https://s3.tradingview.com/external-embedding/embed-widget-technical-analysis.js" async>
            {
            "interval": "1D",
            "width": "100%",
            "isTransparent": false,
            "height": "100%",
            "symbol": "NASDAQ:AAPL",
            "showIntervalTabs": true,
            "displayMode": "single",
            "locale": "th_TH",
            "colorTheme": "dark"
            }
            </script>
          </div>
        </div>

        <!-- Company Profile -->
        <div class="tv-company-profile">
          <div class="tradingview-widget-container">
            <div class="tradingview-widget-container__widget"></div>
            <script type="text/javascript" src="https://s3.tradingview.com/external-embedding/embed-widget-symbol-profile.js" async>
            {
            "width": "100%",
            "height": "100%",
            "colorTheme": "dark",
            "isTransparent": false,
            "symbol": "NASDAQ:AAPL",
            "locale": "th_TH"
            }
            </script>
          </div>
        </div>
      </div>
    </div>
  </div>

</body>
</html>
