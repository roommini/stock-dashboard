<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TradingView Stocks Solution (Dark)</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      background-color: #131722; /* TradingView Dark Theme Background */
      font-family: -apple-system, BlinkMacSystemFont, "Trebuchet MS", Roboto, Ubuntu, sans-serif;
      overflow-x: hidden;
      color: #d1d4dc;
    }

    .tv-ticker-tape {
      width: 100%;
    }

    .dashboard-container {
      max-width: 1400px;
      margin: 0 auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 30px;
    }

    .nav-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding-bottom: 10px;
      border-bottom: 1px solid #2a2e39;
    }

    .nav-header a {
      color: #2962FF;
      text-decoration: none;
      font-weight: 500;
    }

    .widget-container {
      width: 100%;
      background: #131722;
    }

    .chart-container {
      height: 700px;
      width: 100%;
    }

    .profile-container {
      height: 400px;
      width: 100%;
    }

    .financials-container {
      height: 830px;
      width: 100%;
    }
  </style>
</head>
<body>

  <!-- Ticker Tape -->
  <div class="tv-ticker-tape">
    <div class="tradingview-widget-container">
      <div class="tradingview-widget-container__widget"></div>
      <script type="text/javascript" src="https://s3.tradingview.com/external-embedding/embed-widget-ticker-tape.js" async>
      {
      "symbols": [
        { "proName": "NASDAQ:AAPL", "title": "Apple" },
        { "proName": "NASDAQ:TSLA", "title": "Tesla" },
        { "proName": "NASDAQ:NVDA", "title": "Nvidia" },
        { "proName": "NASDAQ:AMZN", "title": "Amazon" },
        { "proName": "NASDAQ:MSFT", "title": "Microsoft" }
      ],
      "showSymbolLogo": true,
      "colorTheme": "dark",
      "isTransparent": true,
      "displayMode": "adaptive",
      "locale": "th_TH"
      }
      </script>
    </div>
  </div>

  <div class="dashboard-container">
    <div class="nav-header">
      <h1 style="margin: 0; font-size: 1.5rem; color: #fff;">Stocks Dark Solution Demo</h1>
      <a href="index.html">&larr; กลับหน้าหลัก</a>
    </div>

    <!-- Symbol Info -->
    <div class="widget-container">
      <div class="tradingview-widget-container">
        <div class="tradingview-widget-container__widget"></div>
        <script type="text/javascript" src="https://s3.tradingview.com/external-embedding/embed-widget-symbol-info.js" async>
        {
        "symbol": "NASDAQ:AAPL",
        "width": "100%",
        "locale": "th_TH",
        "colorTheme": "dark",
        "isTransparent": true
        }
        </script>
      </div>
    </div>

    <!-- Advanced Chart -->
    <div class="widget-container chart-container">
      <div class="tradingview-widget-container" style="height: 100%; width: 100%;">
        <div id="tradingview_demo" style="height: 100%; width: 100%;"></div>
        <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
        <script type="text/javascript">
        new TradingView.widget({
          "autosize": true,
          "symbol": "NASDAQ:AAPL",
          "interval": "D",
          "timezone": "Asia/Bangkok",
          "theme": "dark",
          "style": "1",
          "locale": "th_TH",
          "enable_publishing": false,
          "backgroundColor": "#131722",
          "gridColor": "#1f222d",
          "hide_top_toolbar": false,
          "hide_legend": false,
          "save_image": false,
          "container_id": "tradingview_demo"
        });
        </script>
      </div>
    </div>

    <!-- Company Profile -->
    <div class="widget-container profile-container">
      <div class="tradingview-widget-container">
        <div class="tradingview-widget-container__widget"></div>
        <script type="text/javascript" src="https://s3.tradingview.com/external-embedding/embed-widget-symbol-profile.js" async>
        {
        "width": "100%",
        "height": "100%",
        "colorTheme": "dark",
        "isTransparent": true,
        "symbol": "NASDAQ:AAPL",
        "locale": "th_TH"
        }
        </script>
      </div>
    </div>

    <!-- Financials -->
    <div class="widget-container financials-container">
      <div class="tradingview-widget-container">
        <div class="tradingview-widget-container__widget"></div>
        <script type="text/javascript" src="https://s3.tradingview.com/external-embedding/embed-widget-financials.js" async>
        {
        "colorTheme": "dark",
        "isTransparent": true,
        "largeChartUrl": "",
        "displayMode": "regular",
        "width": "100%",
        "height": "100%",
        "symbol": "NASDAQ:AAPL",
        "locale": "th_TH"
        }
        </script>
      </div>
    </div>

  </div>

</body>
</html>
