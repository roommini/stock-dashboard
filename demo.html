<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TradingView Widget Demo</title>
  <link rel="stylesheet" href="style.css">
  <style>
    body {
      padding: 2rem;
      background-color: #0d1117;
      color: #c9d1d9;
      font-family: 'Inter', sans-serif;
    }
    .demo-container {
      max-width: 1200px;
      margin: 0 auto;
    }
    .demo-header {
      margin-bottom: 2rem;
    }
    .demo-header h1 {
      color: #58a6ff;
      margin-bottom: 0.5rem;
    }
    .chart-box {
      background-color: #161a1e;
      border: 1px solid #30363d;
      border-radius: 8px;
      padding: 1rem;
      margin-bottom: 2rem;
    }
    .chart-box h2 {
      margin-top: 0;
      margin-bottom: 1rem;
      color: #28a745;
    }
  </style>
</head>
<body>
  <div class="demo-container">
    <div class="demo-header">
      <h1>TradingView Advanced Chart Widget (Demo)</h1>
      <p>เปรียบเทียบการใช้งาน Widget ของ TradingView ที่มีข้อมูลในตัว ไม่ต้องใช้ API ของ Twelve Data</p>
      <a href="index.html" style="color: #58a6ff; text-decoration: none;">&larr; กลับหน้าหลัก</a>
    </div>

    <div class="chart-box">
      <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem;">
        <div>
          <h2>ตัวอย่างกราฟ Apple (AAPL) - แบบ Widget</h2>
          <p style="margin-top: -10px; font-size: 0.9rem; color: #8b949e;">มีเครื่องมือครบครัน ซูมได้ เปลี่ยน Timeframe ได้ เพิ่ม Indicator ได้เอง ไม่เสียโควต้า API</p>
        </div>
        <button onclick="document.querySelector('.tradingview-widget-container').requestFullscreen()" style="padding: 8px 16px; background: #238636; color: white; border: none; border-radius: 6px; cursor: pointer; font-family: inherit; font-size: 14px; font-weight: 500; display: flex; gap: 6px; align-items: center;">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"></path></svg>
          Full Chart
        </button>
      </div>
      
      <!-- TradingView Widget BEGIN -->
      <div class="tradingview-widget-container" style="height: 600px; width: 100%;">
        <div id="tradingview_demo" style="height: 100%; width: 100%;"></div>
        <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
        <script type="text/javascript">
        new TradingView.widget(
        {
        "autosize": true,
        "symbol": "NASDAQ:AAPL",
        "interval": "D",
        "timezone": "Asia/Bangkok",
        "theme": "dark",
        "style": "1",
        "locale": "th_TH",
        "enable_publishing": false,
        "backgroundColor": "#161a1e",
        "gridColor": "#2d333b",
        "hide_top_toolbar": false,
        "hide_legend": false,
        "save_image": false,
        "disabled_features": ["header_chart_type"],
        "container_id": "tradingview_demo"
      }
        );
        </script>
      </div>
      <!-- TradingView Widget END -->

    </div>
  </div>
</body>
</html>
